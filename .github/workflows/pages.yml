# Builds the demo (vite) and API docs (typedoc) and deploys them to GitHub Pages.
# URLs match the previous branch-based layout:
#   /examples/index.html - demo
#   /docs/               - API docs

name: Deploy demo and docs to Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 20
      - run: npm ci
      - run: npm run build:demo
        env:
          PAGES_BASE: /monaco-editor-code-review/
      - run: npx typedoc --out site/docs ./src/index.ts
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site
      - id: deployment
        uses: actions/deploy-pages@v4
